<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari Faria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F7F3EE;
    --sand: #E8DDD0;
    --gold: #B8963E;
    --gold-light: #D4B06A;
    --dark: #1C1710;
    --mid: #5C4F3A;
    --text: #2E2416;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(247, 243, 238, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(184,150,62,0.15);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--dark);
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mid);
    text-decoration: none;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--gold); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 60%, rgba(184,150,62,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(184,150,62,0.05) 0%, transparent 60%);
  }

  .hero-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    display: block;
    animation: fadeUp 1s ease both;
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 9vw, 7rem);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: var(--dark);
    animation: fadeUp 1s 0.15s ease both;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .hero-sub {
    margin-top: 1.5rem;
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--mid);
    animation: fadeUp 1s 0.3s ease both;
  }

  .hero-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 2rem auto;
    animation: fadeUp 1s 0.4s ease both;
  }

  .hero-desc {
    max-width: 480px;
    margin: 0 auto;
    font-size: 1rem;
    line-height: 1.9;
    color: var(--mid);
    animation: fadeUp 1s 0.5s ease both;
  }

  .hero-cta {
    margin-top: 2.5rem;
    display: inline-block;
    padding: 0.85rem 2.5rem;
    border: 1px solid var(--gold);
    color: var(--gold);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    transition: all 0.35s;
    animation: fadeUp 1s 0.65s ease both;
  }

  .hero-cta:hover {
    background: var(--gold);
    color: var(--cream);
  }

  /* SECÇÕES */
  section {
    padding: 6rem 2rem;
  }

  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 300;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 1.5rem;
  }

  .divider {
    width: 50px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 2.5rem;
  }

  /* SOBRE */
  #sobre {
    background: var(--sand);
  }

  .sobre-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
  }

  .sobre-text p {
    font-size: 1rem;
    line-height: 2;
    color: var(--mid);
    margin-bottom: 1.2rem;
  }

  .sobre-img-box {
    aspect-ratio: 3/4;
    background: var(--cream);
    border: 1px solid rgba(184,150,62,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .sobre-img-box::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(184,150,62,0.25);
    pointer-events: none;
  }

  .img-placeholder {
    text-align: center;
    color: var(--gold-light);
  }

  .img-placeholder svg { opacity: 0.4; }
  .img-placeholder p {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.75rem;
    opacity: 0.6;
  }

  /* COLEÇÃO */
  #colecao {
    background: var(--cream);
  }

  .colecao-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
  }

  .colecao-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .joia-card {
    background: var(--sand);
    border: 1px solid rgba(184,150,62,0.12);
    overflow: hidden;
    transition: transform 0.4s, box-shadow 0.4s;
    cursor: pointer;
  }

  .joia-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(28,23,16,0.1);
  }

  .joia-card:first-child {
    grid-column: span 2;
  }

  .card-img {
    aspect-ratio: 4/3;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(184,150,62,0.1);
    color: var(--gold-light);
    font-size: 3rem;
    position: relative;
    overflow: hidden;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
  }

  .joia-card:hover .card-img img {
    transform: scale(1.04);
  }

  .categoria-header {
    margin-bottom: 2rem;
  }

  .joia-card:first-child .card-img {
    aspect-ratio: 16/7;
  }

  .card-img-placeholder {
    opacity: 0.3;
    font-size: 2.5rem;
  }

  .card-body {
    padding: 1.25rem 1.5rem;
  }

  .card-tag {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--dark);
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--mid);
    margin-top: 0.4rem;
    line-height: 1.7;
  }

  /* INSTAGRAM */
  #instagram {
    background: var(--dark);
    text-align: center;
    padding: 5rem 2rem;
  }

  #instagram .section-title {
    color: var(--cream);
  }

  #instagram .section-label {
    color: var(--gold-light);
  }

  #instagram .divider {
    margin: 0 auto 2rem;
  }

  .insta-desc {
    color: rgba(247,243,238,0.6);
    font-size: 0.95rem;
    line-height: 1.9;
    max-width: 450px;
    margin: 0 auto 2.5rem;
  }

  .insta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 2.5rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.35s;
  }

  .insta-btn:hover {
    background: var(--gold);
    color: var(--dark);
  }

  .insta-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    max-width: 700px;
    margin: 3rem auto 0;
  }

  .insta-thumb {
    aspect-ratio: 1;
    background: rgba(184,150,62,0.08);
    border: 1px solid rgba(184,150,62,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(184,150,62,0.3);
    font-size: 1.2rem;
    transition: background 0.3s;
  }

  .insta-thumb:hover {
    background: rgba(184,150,62,0.15);
  }

  /* CONTACTO */
  #contacto {
    background: var(--cream);
    text-align: center;
  }

  .contacto-inner {
    max-width: 600px;
    margin: 0 auto;
  }

  .contacto-inner p {
    font-size: 1rem;
    line-height: 1.9;
    color: var(--mid);
    margin-bottom: 2.5rem;
  }

  .contacto-links {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 2rem;
    border: 1px solid rgba(184,150,62,0.4);
    color: var(--mid);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .contact-link:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* FOOTER */
  footer {
    background: var(--dark);
    padding: 2.5rem;
    text-align: center;
  }

  footer p {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: rgba(247,243,238,0.3);
    text-transform: uppercase;
  }

  footer span {
    color: var(--gold);
    opacity: 0.7;
  }

  /* CARRINHO */
  .cart-icon-btn {
    position: fixed;
    top: 1.3rem;
    right: 3rem;
    z-index: 200;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--gold);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .cart-count {
    background: var(--gold);
    color: var(--cream);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    display: none;
  }

  .cart-count.visible { display: flex; }

  /* DRAWER DO CARRINHO */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,23,16,0.5);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    max-width: 95vw;
    background: var(--cream);
    z-index: 301;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 40px rgba(28,23,16,0.15);
  }

  .cart-drawer.open { transform: translateX(0); }

  .cart-drawer-header {
    padding: 1.5rem;
    border-bottom: 1px solid rgba(184,150,62,0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cart-drawer-header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--dark);
  }

  .cart-close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--mid);
    font-size: 1.2rem;
    padding: 0.25rem;
    transition: color 0.2s;
  }

  .cart-close-btn:hover { color: var(--dark); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.5rem;
  }

  .cart-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--mid);
    font-size: 0.9rem;
  }

  .cart-item {
    display: flex;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid rgba(184,150,62,0.1);
    align-items: center;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--dark);
    margin-bottom: 0.25rem;
  }

  .cart-item-price {
    font-size: 0.85rem;
    color: var(--gold);
  }

  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .qty-btn {
    width: 24px; height: 24px;
    border: 1px solid rgba(184,150,62,0.3);
    background: none;
    cursor: pointer;
    color: var(--mid);
    border-radius: 4px;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .qty-btn:hover { border-color: var(--gold); color: var(--gold); }

  .qty-num {
    font-size: 0.9rem;
    min-width: 20px;
    text-align: center;
    color: var(--dark);
  }

  .cart-footer {
    padding: 1.5rem;
    border-top: 1px solid rgba(184,150,62,0.2);
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: var(--dark);
  }

  .cart-total span:last-child { color: var(--gold); }

  .checkout-btn {
    width: 100%;
    padding: 1rem;
    background: var(--gold);
    color: var(--cream);
    border: none;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  .checkout-btn:hover { background: var(--dark); }
  .checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .cart-note {
    font-size: 0.72rem;
    color: var(--mid);
    text-align: center;
    margin-top: 0.75rem;
    letter-spacing: 0.05em;
  }

  /* CARD FOOTER */
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(184,150,62,0.15);
  }

  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: var(--gold);
  }

  .add-cart-btn {
    padding: 0.5rem 1.1rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
  }

  .add-cart-btn:hover {
    background: var(--gold);
    color: var(--cream);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 6rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: var(--cream);
    padding: 0.7rem 1.5rem;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 400;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ADMIN PANEL */
  .admin-overlay {
    position: fixed; inset: 0;
    background: rgba(28,23,16,0.6);
    z-index: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .admin-overlay.open { opacity: 1; pointer-events: all; }

  .admin-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 420px; max-width: 95vw;
    background: var(--cream);
    z-index: 501;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px rgba(28,23,16,0.2);
    overflow: hidden;
  }
  .admin-panel.open { transform: translateX(0); }

  .admin-header {
    padding: 1.25rem 1.5rem;
    background: var(--dark);
    display: flex; justify-content: space-between; align-items: center;
  }
  .admin-header h3 { color: var(--gold); font-size: 1rem; font-weight: 400; letter-spacing: 0.1em; }
  .admin-close { background: none; border: none; color: var(--cream); cursor: pointer; font-size: 1.1rem; }

  .admin-body { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .admin-section { margin-bottom: 2rem; }
  .admin-section h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 400;
    color: var(--dark); margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(184,150,62,0.2);
  }

  .admin-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .admin-input {
    width: 100%; padding: 0.7rem 1rem;
    border: 1px solid rgba(184,150,62,0.3);
    background: white; color: var(--text);
    font-family: 'Jost', sans-serif; font-size: 0.9rem;
    outline: none; transition: border 0.2s;
    border-radius: 4px;
  }
  .admin-input:focus { border-color: var(--gold); }

  .admin-upload-area {
    border: 2px dashed rgba(184,150,62,0.4);
    border-radius: 4px; padding: 1rem;
    text-align: center; cursor: pointer;
    transition: border 0.2s;
    background: white;
  }
  .admin-upload-area:hover { border-color: var(--gold); }
  .admin-upload-area p { font-size: 0.85rem; color: var(--mid); margin-top: 0.5rem; }

  .admin-btn-save {
    width: 100%; padding: 0.85rem;
    background: var(--gold); color: var(--cream);
    border: none; cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem; letter-spacing: 0.2em;
    text-transform: uppercase; border-radius: 4px;
    transition: background 0.3s;
  }
  .admin-btn-save:hover { background: var(--dark); }

  .admin-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(184,150,62,0.1);
  }
  .admin-item-img {
    width: 50px; height: 50px; border-radius: 4px;
    background: var(--sand) center/cover no-repeat;
    flex-shrink: 0;
  }
  .admin-item-info { flex: 1; }
  .admin-item-info strong { display: block; font-size: 0.85rem; color: var(--dark); }
  .admin-item-info span { font-size: 0.75rem; color: var(--mid); }
  .admin-item-actions { display: flex; gap: 0.4rem; }
  .admin-btn-edit, .admin-btn-del {
    background: none; border: 1px solid rgba(184,150,62,0.3);
    border-radius: 4px; padding: 4px 8px;
    cursor: pointer; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .admin-btn-edit:hover { border-color: var(--gold); }
  .admin-btn-del:hover { border-color: #e55; background: #fff0f0; }

  /* WHATSAPP FLUTUANTE */
  .whatsapp-float {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 999;
    background: #25D366;
    color: white;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.75rem 1.25rem;
    border-radius: 50px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .whatsapp-float:hover {
    transform: translateY(-3px);
